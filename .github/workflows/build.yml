name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Set up gcc
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build
        run: make
